services:
  - type: web
    name: my-cifras
    runtime: docker
    plan: free
    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: CIFRAS_FOLDER_ID
        sync: false
      - key: EXTERNAL_URL
        sync: false
